<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>F1 Racing Game</title>
  <link rel="stylesheet" href="f1-game.css">
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>

    <!-- Loading Screen -->
    <div id="loading">
      <div class="loading-content">
        <h1>F1 RACING</h1>
        <div class="loading-bar"><div class="loading-fill"></div></div>
        <p>Loading...</p>
      </div>
    </div>

    <!-- Main Menu -->
    <div id="main-menu" class="hidden">
      <h1 class="menu-title">F1 RACING</h1>
      <button class="menu-btn" id="btn-showroom">GARAGE</button>
      <button class="menu-btn" id="btn-track">DRIVE</button>
    </div>

    <!-- Showroom UI -->
    <div id="showroom-ui" class="hidden">
      <div class="showroom-header">
        <h2 id="showroom-car-name">Red Bull Racing</h2>
        <p id="showroom-car-driver">Max Verstappen</p>
      </div>
      <div class="showroom-stats">
        <div class="stat"><span class="stat-label">Power</span><span class="stat-value" id="stat-power">1000 HP</span></div>
        <div class="stat"><span class="stat-label">Top Speed</span><span class="stat-value" id="stat-speed">350 km/h</span></div>
        <div class="stat"><span class="stat-label">Weight</span><span class="stat-value" id="stat-weight">798 kg</span></div>
      </div>
      <div class="showroom-controls">
        <button class="nav-btn" id="btn-prev-car">&#9664;</button>
        <button class="drive-btn" id="btn-drive">DRIVE</button>
        <button class="nav-btn" id="btn-next-car">&#9654;</button>
      </div>
      <button class="back-btn" id="btn-showroom-back">BACK</button>
    </div>

    <!-- Driving HUD -->
    <div id="hud" class="hidden">
      <div id="hud-top">
        <div id="lap-info">
          <span id="lap-text">LAP 1/5</span>
          <span id="lap-time">00:00.000</span>
        </div>
        <div id="best-lap">
          <span>BEST</span>
          <span id="best-time">--:--.---</span>
        </div>
      </div>
      <div id="hud-bottom">
        <div id="speed-section">
          <span id="speed-value">0</span>
          <span id="speed-unit">KM/H</span>
        </div>
        <div id="gear-section">
          <span id="gear-value">N</span>
        </div>
        <div id="rpm-section">
          <div id="rpm-bar-container">
            <div id="rpm-bar"></div>
          </div>
          <div id="rpm-lights">
            <span class="rpm-light"></span><span class="rpm-light"></span>
            <span class="rpm-light"></span><span class="rpm-light"></span>
            <span class="rpm-light"></span><span class="rpm-light"></span>
            <span class="rpm-light"></span><span class="rpm-light"></span>
          </div>
        </div>
      </div>
      <div id="minimap-container">
        <canvas id="minimap-canvas" width="180" height="180"></canvas>
      </div>
      <button id="btn-pause">||</button>
    </div>

    <!-- Pause Menu -->
    <div id="pause-menu" class="hidden">
      <h2>PAUSED</h2>
      <button class="menu-btn" id="btn-resume">RESUME</button>
      <button class="menu-btn" id="btn-quit">QUIT TO MENU</button>
    </div>

    <!-- Mobile Controls -->
    <div id="mobile-controls" class="hidden">
      <button id="btn-left" class="ctrl-btn">&#9664;</button>
      <div class="ctrl-middle">
        <button id="btn-brake" class="ctrl-btn brake-btn">BRAKE</button>
        <button id="btn-accel" class="ctrl-btn accel-btn">GO</button>
      </div>
      <button id="btn-right" class="ctrl-btn">&#9654;</button>
    </div>

    <!-- Controls Info -->
    <div id="controls-info">
      <p>W/S or &#9650;/&#9660;: Accelerate/Brake &nbsp;|&nbsp; A/D or &#9664;/&#9654;: Steer &nbsp;|&nbsp; SPACE: Handbrake &nbsp;|&nbsp; C: Change Camera</p>
    </div>
  </div>

  <script type="module" src="f1-game.js"></script>
</body>
</html>
